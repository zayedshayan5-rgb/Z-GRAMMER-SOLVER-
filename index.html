<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Grammar AI | Minimalist Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Reset & Base Styles --- */
        :root {
            --primary: #2563eb;    /* Professional Blue */
            --bg-body: #f1f5f9;   /* Soft Grey Bg */
            --bg-card: #ffffff;   /* Pure White */
            --border: #e2e8f0;    /* Light Border */
            --text-main: #1e293b; /* Dark Slate */
            --text-sub: #64748b;  /* Muted Slate */
            --error: #ef4444;     /* Red */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* No outer scroll */
        }

        /* --- Main App Container --- */
        .app-container {
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            padding: 35px;
            border: 1px solid var(--border);
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        header .version-tag {
            font-size: 11px;
            font-weight: 700;
            background: #eff6ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 1px;
        }

        /* --- Workspace (Grid) --- */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            flex-grow: 1;
            min-height: 0; /* Keeps grid inside container */
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea, .output-area {
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .output-area {
            background-color: #f8fafc;
            position: relative;
            overflow-y: auto;
            color: var(--text-main);
            border-color: #f1f5f9;
            white-space: pre-wrap;
        }

        .output-area.loading {
            color: var(--text-sub);
            font-style: italic;
        }

        /* --- Footer & Buttons --- */
        footer {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .btn-solve {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-solve:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-solve:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .btn-copy {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-copy:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- Mobile Styles --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; padding: 20px 0; }
            .app-container { height: auto; width: 90%; }
            .workspace { grid-template-columns: 1fr; }
            textarea, .output-area { min-height: 200px; }
            header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <h1>Z-Grammar AI</h1>
                <p style="font-size: 12px; color: var(--text-sub);">Simple, Clean, Powerful</p>
            </div>
            <div class="version-tag">PRO v2.5</div>
        </header>

        <div class="workspace">
            <div class="panel">
                <div class="label">Your Text</div>
                <textarea id="textInput" placeholder="Enter your text here..."></textarea>
            </div>

            <div class="panel">
                <div class="label">AI Correction</div>
                <div class="output-area" id="outputBox">
                    <button class="btn-copy" onclick="copyResult()">Copy Text</button>
                    <div id="resultText" class="output-placeholder" style="color: var(--text-sub);">Corrected text will appear here.</div>
                </div>
            </div>
        </div>

        <footer>
            <button class="btn-solve" id="solveBtn" onclick="fixGrammar()">FIX GRAMMAR</button>
        </footer>
    </div>

    <script>
        // API Configuration (Your Provided Key)
        const API_KEY = "AIzaSyBKXmgdgdTfQ0quEOoSqDJwTUpDsqPkaHI";

        async function fixGrammar() {
            const input = document.getElementById('textInput').value.trim();
            const resultDiv = document.getElementById('resultText');
            const btn = document.getElementById('solveBtn');

            if (!input) {
                alert("Please enter some text first.");
                return;
            }

            // UI State Change
            btn.disabled = true;
            btn.innerText = "Processing...";
            resultDiv.innerText = "Analyzing your text with AI...";
            resultDiv.style.color = "var(--text-sub)";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Act as a professional grammar checker. Fix all mistakes in spelling, grammar, and punctuation. Give me ONLY the corrected text. Text: "${input}"`
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const finalResult = data.candidates[0].content.parts[0].text.trim();
                    resultDiv.innerText = finalResult;
                    resultDiv.style.color = "var(--text-main)";
                } else {
                    throw new Error("Invalid API Response");
                }

            } catch (error) {
                console.error(error);
                resultDiv.innerText = "Error: Check your API Key or Internet connection.";
                resultDiv.style.color = "var(--error)";
            } finally {
                btn.disabled = false;
                btn.innerText = "FIX GRAMMAR";
            }
        }

        // Copy Text Function
        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            if (text.includes("appear here") || text.includes("Analyzing")) return;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("Text copied to clipboard!");
            });
        }
    </script>
</body>
</html>
